name: Build and Release on Tag

on:
  push:
    tags:
      - 'v*' # 触发条件：推送以 v 开头的标签，例如 v1.0.0, v2.1.3-beta

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出当前仓库
      - name: Checkout current repository
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 克隆并构建外部 Vue 项目
      - name: Clone and Build External Vue
        run: |
          # 替换下方的 URL 为你实际的 Vue 项目仓库地址
          git clone https://github.com/sparkbridge/sparkui.git external-vue-app
          cd external-vue-app
          npm install
          npm run build
          cd ..
          # 创建 web 目录并搬运构建产物
          mkdir -p web
          cp -r ./external-vue-app/dist/* ./web/
          # 清理 Vue 源码目录，防止被打包
          rm -rf ./external-vue-app

      # 4. 安装当前项目的生产依赖 (可选)
      # 如果你希望压缩包里不含 node_modules，可以跳过此步
      # 如果需要包含，建议只安装生产依赖以减小体积
      - name: Install production dependencies
        run: npm install --production

      # 5. 使用 7z 打包项目
      - name: Package Project with 7z
        run: |
          # 使用 7z 进行打包
          # -mx=9: 极限压缩
          # -xr!: 排除不需要的文件，特别是 node_modules 和 个人隐私数据 data.json
          7z a -tzip -mx=9 sparkbridge3.zip . \
          -xr!node_modules \
          -xr!.git \
          -xr!.github \
          -xr!data.json \
          -xr!*.zip \
          -xr!*.log

      # 6. 发布到 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 自动构建发布
            - 构建版本: ${{ github.ref_name }}
            - 构建时间: ${{ github.event.head_commit.timestamp }}
            - 提交信息: ${{ github.event.head_commit.message }}
          files: sparkbridge3.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}